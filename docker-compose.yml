services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: jcatalog-app:local
    container_name: jcatalog_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      # MySQL dipakai shared dari stack existing, bukan bikin MySQL baru per project.
      DB_CONNECTION: mysql
      DB_HOST: catalog-mysql
      DB_PORT: 3306
      DB_DATABASE: catalog_app
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_TRUSTED_PROXIES: '*'
      WAIT_FOR_DB: 'true'
      RUN_MIGRATIONS: 'false'
    volumes:
      - ./:/var/www/html
    ports:
      # Local access opsional. Kalau bentrok, ubah host port ini saja, app internal tetap 8000.
      - "8010:8000"
    networks:
      - jcatalog
      - shared-mysql
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$ok=@file_get_contents(\"http://127.0.0.1:8000/\"); exit($$ok === false ? 1 : 0);'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jcatalog_cloudflared
    restart: unless-stopped
    command: tunnel --url http://app:8000 --no-autoupdate
    depends_on:
      - app
    networks:
      - jcatalog

networks:
  jcatalog:
    name: jcatalog_network
  shared-mysql:
    external: true
    name: project_catalog-network
