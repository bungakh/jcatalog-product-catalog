version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: catalog_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalog_app
      MYSQL_USER: catalog_user
      MYSQL_PASSWORD: catalog_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - catalog-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: catalog_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - catalog-network

volumes:
  mysql_data:

networks:
  catalog-network:
    driver: bridge
